    <style>
      :root {
        --color-primary: #0288a9;
        --color-secondary: #8cb4ce;
        --color-background: #f7f5f2;
        --border-width: 1.5px;
        --border-default: var(--border-width) solid var(--color-secondary);
        --radius-default: 0.5rem;
        --space-xs: 0.125rem;
        --space-sm: 0.5rem;
        --space-md: 1rem;
        --fs-7: calc(1rem * 10 / 7);
        --fs-9: calc(1rem * 10 / 9);
        --fs-10: 1rem;
        --duration-xs: 0.2s;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Noto Sans", sans-serif;
        background: var(--color-background);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100svh;
        padding: var(--space-md);
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: var(--space-sm);
        width: 360px;
        max-width: 100%;
        padding: var(--space-md);
        border: var(--border-default);
        border-radius: var(--radius-default);
      }

      .card-title {
        font-family: "Megrim", system-ui;
        font-weight: 400;
        font-size: var(--fs-7);
        color: var(--color-primary);
      }

      .card-desc {
        font-size: var(--fs-9);
        color: var(--color-primary);
        line-height: 1.6;
      }

      .card-link {
        font-size: var(--fs-10);
        color: var(--color-primary);
        text-decoration: none;
        width: max-content;
        border-bottom: var(--border-width) solid var(--color-secondary);
        padding: 0 0 var(--space-xs) 0;
        transition:
          color var(--duration-xs),
          border-color var(--duration-xs);
      }

      .card-link:hover {
        color: var(--color-secondary);
        border-color: transparent;
      }

      .card-note {
        font-size: var(--fs-10);
        color: var(--color-secondary);
      }
    </style>
  </head>
